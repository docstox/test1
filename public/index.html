<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LibriVicini</title>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    
    <header class="top-bar">
      <div class="top-bar-content">
        <div class="logo">
          <i class="material-icons">local_library</i>
          <span>LibriVicini</span>
        </div>
        <button id="theme-toggle" class="icon-btn">
          <i class="material-icons" id="theme-icon">dark_mode</i>
        </button>
      </div>
    </header>

    <main id="main-content" class="scroll-content">
      </main>

    <nav class="bottom-nav">
      <div class="nav-content">
        <button class="nav-item active" data-tab="explore">
          <i class="material-icons">search</i>
          <span>Esplora</span>
        </button>
        <button class="nav-item" data-tab="libraries">
          <i class="material-icons">layers</i>
          <span>Librerie</span>
        </button>
        <button class="nav-item" data-tab="profile">
          <i class="material-icons">account_circle</i>
          <span>Profilo</span>
        </button>
      </div>
    </nav>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
